
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOCIOTRACE</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f5f7fa;
      --text: #0f172a;
      --subtext: #475569;
      --accent: #14b8a6;
      --accent2: #22c55e;
      --card: #ffffff;
      --border: #e2e8f0;
    }

    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --accent: #22d3ee;
      --accent2: #38bdf8;
      --card: #111827;
      --border: #1f2933;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: 0.3s ease;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 40px 20px;
    }

    .badge {
      display: inline-block;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .online {
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    .subtitle {
      font-size: 18px;
      color: var(--subtext);
      max-width: 700px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-box input {
      width: 400px;
      max-width: 100%;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 16px;
      outline: none;
      background: var(--card);
      color: var(--text);
    }

    .search-box button {
      padding: 16px 28px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .search-box button:hover {
      opacity: 0.9;
    }

    .supported {
      margin-top: 25px;
      font-size: 14px;
      color: var(--subtext);
    }

    .toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 38px;
      }
    }
  </style>
</head>

<body>
  <!-- Dark Mode Toggle -->
  <div class="toggle" onclick="toggleMode()">🌙 Mode</div>

  <div class="container">

    <h1>
      How Exposed Are You <span class="online">Online?</span>
    </h1>

    <p class="subtitle">
      Analyze your public social media footprint from an attacker’s perspective.
      Discover what's visible, assess your risk, and take control of your digital privacy.
    </p>

    <!-- Search Form -->
    <!--<form class="search-box" action="/analyze" method="POST">
      <input
        type="text"
        name="profile"
        placeholder="Enter profile URL..."
        required
      />
      <button type="submit">Analyze →</button>
    </form>-->
    
    <form class="search-box" action="/analyze" method="POST">
<input
type="text"
name="profile"
placeholder="Enter profile URL..."
required
/>
<button type="submit">Analyze →</button>
</form>

    <div class="supported">
      Supported:   GitHub  •LinkedIn  •Instagram
    </div>
  </div>

  <script>
    function toggleMode() {
      document.body.classList.toggle("dark");
      localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
      );
    }

    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }
  </script>
</body>
</html>
